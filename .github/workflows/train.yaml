name: model-Farmer
on: [push]

permissions:
  contents: write
  pull-requests: write
  issues: write        # needed for cml-send-comment

jobs:
  run:
    runs-on: ubuntu-22.04
    container: docker://ghcr.io/iterative/cml:0-dvc3-base1
    steps:
      - uses: actions/checkout@v2
      - name: cml_run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install -r requirements.txt
          dvc repro
          # Fix Git "dubious ownership" inside GitHub runner
          git config --global --add safe.directory /__w/Farmers/Farmers

          git fetch --prune
          dvc metrics diff --md master > report.md

          # Add figure to report (CML v2 style: inline image)
          echo "" >> report.md
          echo "## Validating results by region" >> report.md
          echo "![Validation results by region](by_region.png)" >> report.md

          # Post the report as a GitHub comment (CML in this image expects a positional file argument)
          cml comment create report.md
        